name: moonell kernel build

on:
  workflow_dispatch:
    inputs:
      repository: { description: 'Repo', required: true, default: 'KaiFujiro/kernel_xiaomi_sm8250' }
      branch: { description: 'Branch', required: true, default: 'experimental' }
      defconfig: { description: 'Defconfig', required: true, default: 'vendor/alioth_defconfig' }
      kernelsu_branch: { description: 'KSU Branch', required: false, default: 'master' }
      toolchain: 
        description: 'toolchain'
        required: true
        default: 'aosp-21'
        type: choice
        options:
          - aosp-21
          - aosp-20
          - playground
          - mandisa

env:
  CHAT_ID: "7538384857"
  BOT_TOKEN: "8528926206:AAExdHhQrI3EdPudt77D_x5Z14o0jm8y924"
  KBUILD_BUILD_USER: "moon.ell"
  KBUILD_BUILD_HOST: "stargaze"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Start Notification
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendMessage" \
        -d chat_id="${{ env.CHAT_ID }}" \
        -d text="Build dimulai: ${{ github.event.inputs.repository }} [${{ github.event.inputs.branch }}] menggunakan ${{ github.event.inputs.toolchain }}"

    - name: Setup and Build
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl device-tree-compiler p7zip-full
        
        export TZ="Asia/Jakarta"
        BUILD_TIME=$(date +'%H%M-%d%m%y')
        # Menghasilkan 11 karakter acak (hanya huruf kecil dan angka)
        HASH=$(head /dev/urandom | tr -dc a-z0-9 | head -c 11)
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
        
        mkdir -p tc
        if [ "${{ github.event.inputs.toolchain }}" = "aosp-21" ]; then
          echo "Downloading AOSP Clang r574158..."
          wget -qO- https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r574158-14475230/clang-r574158.tar.gz | tar -xz -C tc
        elif [ "${{ github.event.inputs.toolchain }}" = "playground" ]; then
          echo "Downloading Playground Toolchain..."
          git clone --depth=1 https://github.com/KaiFujiro/playgroundtc -b 17 tc
        elif [ "${{ github.event.inputs.toolchain }}" = "mandisa" ]; then
          echo "Downloading Mandisa Toolchain (LLVM 20)..."
          wget -q https://github.com/Mandi-Sa/clang/releases/download/amd64-full-toolchain-20/llvm20.0.0-binutils2.43.1_amd64-full-toolchain-20250108.7z -O toolchain.7z
          7z x toolchain.7z -otc
          rm toolchain.7z
        else
          echo "Downloading AOSP 20 Clang (r547379)..."
          wget -qO- https://github.com/moonooen/AOSP20/releases/download/v1.0/clang-r547379-qssi.tar.gz | tar -xz -C tc
        fi
        
        export PATH=$PWD/tc/bin:$PATH
        
        curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_branch }}

        export ARCH=arm64
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1"
        
        make $ARGS ${{ github.event.inputs.defconfig }}
        make -j$(nproc) $ARGS dtbs dtboimage || true
        make $ARGS dtb.img || true
        make -j$(nproc) $ARGS 2>&1 | tee compile.log

        if [ -f out/arch/arm64/boot/Image ]; then
          ZIP_NAME="imell-$HASH.zip"
          
          git clone --depth=1 https://github.com/KaiFujiro/anykernel anykernel
          
          cp out/arch/arm64/boot/Image anykernel/
          
          if [ -f out/arch/arm64/boot/dtb.img ]; then
            cp out/arch/arm64/boot/dtb.img anykernel/dtb
          fi
          
          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img anykernel/
          fi
          
          cd anykernel
          zip -r "../$ZIP_NAME" ./*
          cd ..
          
          echo "FINAL_ZIP=$ZIP_NAME" >> $GITHUB_ENV
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ env.BUILD_TIME }}
        path: |
          *.log
          *.zip

    - name: Telegram Notification
      if: always()
      run: |
        [ -f "compile.log" ] && curl -s -F document=@"compile.log" "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument" -F chat_id="${{ env.CHAT_ID }}" -F caption="Build log"
        [ -f "${{ env.FINAL_ZIP }}" ] && curl -s -F document=@"${{ env.FINAL_ZIP }}" "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument" -F chat_id="${{ env.CHAT_ID }}" -F caption="buildnya selesaiii⭐💜!!!"
