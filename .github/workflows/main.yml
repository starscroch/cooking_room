name: Moonell Unified Build

on:
  workflow_dispatch:
    inputs:
      repository: { description: 'Repo', required: true, default: 'KaiFujiro/kernel_xiaomi_sm8250' }
      branch: { description: 'Branch', required: true, default: 'aosp-16' }
      defconfig: { description: 'Defconfig', required: true, default: 'vendor/alioth_defconfig' }
      kernelsu_branch: { description: 'KSU Branch', required: false, default: 'master' }
      toolchain: 
        description: 'toolchain'
        required: true
        default: 'AOSP'
        type: choice
        options:
          - AOSP
          - Playground

env:
  CHAT_ID: "7538384857"
  BOT_TOKEN: "8528926206:AAExdHhQrI3EdPudt77D_x5Z14o0jm8y924"
  KBUILD_BUILD_USER: "moon.ell"
  KBUILD_BUILD_HOST: "stargaze"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Start Notification
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendMessage" \
        -d chat_id="${{ env.CHAT_ID }}" \
        -d text="Build dimulai: ${{ github.event.inputs.repository }} [${{ github.event.inputs.branch }}] menggunakan ${{ github.event.inputs.toolchain }}"

    - name: Setup and Build
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl device-tree-compiler
        
        export TZ="Asia/Jakarta"
        BUILD_TIME=$(date +'%H%M-%d%m%y')
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
        
        mkdir -p tc
        if [ "${{ github.event.inputs.toolchain }}" = "Playground" ]; then
            echo "Downloading Playground Toolchain..."
            git clone --depth=1 https://github.com/KaiFujiro/playgroundtc -b 17 tc
        else
            echo "Downloading AOSP 20 Clang (r547379)..."
            wget -qO- https://github.com/moonooen/AOSP20/releases/download/v1.0/clang-r547379-qssi.tar.gz | tar -xz -C tc
        fi
        
        # Set Path
        export PATH=$PWD/tc/bin:$PATH
        
        # Setup KernelSU
        curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_branch }}

        # Build Kernel
        export ARCH=arm64
        ARGS="O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1"
        
        make $ARGS ${{ github.event.inputs.defconfig }}
        make -j$(nproc) $ARGS dtbs dtboimage || true
        make $ARGS dtb.img || true
        make -j$(nproc) $ARGS 2>&1 | tee compile.log

        # Packaging
        if [ -f out/arch/arm64/boot/Image ]; then
          ZIP_NAME="Alexandra-Unified-$BUILD_TIME.zip"
          mkdir -p dts_output
          find out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} ./ \; 2>/dev/null || true
          
          for f in *.dtb; do
            if [ -f "$f" ]; then
              dtc -I dtb -O dts -o "dts_output/${f}.dts" "$f"
            fi
          done

          [ -f out/arch/arm64/boot/dtb.img ] && cp out/arch/arm64/boot/dtb.img ./ || true
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img ./ || true
          cp out/arch/arm64/boot/Image ./
          
          zip -r "$ZIP_NAME" Image *.dtb *.img dts_output/
          echo "FINAL_ZIP=$ZIP_NAME" >> $GITHUB_ENV
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ env.BUILD_TIME }}
        path: |
          *.log
          *.zip

    - name: Telegram Notification
      if: always()
      run: |
        [ -f "compile.log" ] && curl -s -F document=@"compile.log" "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument" -F chat_id="${{ env.CHAT_ID }}" -F caption="Build log"
        [ -f "${{ env.FINAL_ZIP }}" ] && curl -s -F document=@"${{ env.FINAL_ZIP }}" "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument" -F chat_id="${{ env.CHAT_ID }}" -F caption="Build Alioth Selesai!!!"
